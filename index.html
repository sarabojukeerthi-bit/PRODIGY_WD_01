<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Navigation Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header id="navbar">
        <div class="logo">ProDigy Infotech</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Home Section -->
    <section id="home" class="section">
        <h1>Welcome</h1>
        <p>Scroll to see the interactive navigation effect.</p>
    </section>

    <!-- About Section -->
    <section id="about" class="section">
        <h2>About Section</h2>
        <p>This is an example landing page for your internship task.</p>
    </section>

    <!-- Services Section -->
    <section id="services" class="section">
        <h2>Services</h2>
        <p>Hover over menu items to see the effect.</p>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <h2>Contact</h2>
        <p>Email: support@prodigyinfotech.com</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
